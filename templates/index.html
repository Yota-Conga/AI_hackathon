<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Gemini API Test</title>
</head>

<body>

    <h1>Gemini API 動作確認</h1>

    <form action="/ask" method="post">

        <textarea
            name="prompt"
            rows="5"
            cols="60"
            placeholder="質問を入力してください"
        >{{ prompt if prompt else "" }}</textarea>

        <br><br>

        <button type="submit">
            Geminiへ送信
        </button>

    </form>

    {% if result %}

    <hr>

    <h2>Geminiの応答</h2>

    <pre>{{ result }}</pre>

    {% endif %}

</body>

</html>
